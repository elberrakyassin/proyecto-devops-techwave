name: CI/CD TechWave Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # IMPORTANTE: Cambia 'yassinelberrak' si tu usuario de Docker Hub es distinto
          tags: yassinelberrak/techwave-app:latest

      - name: Login en Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configurar contexto de AKS
        uses: azure/aks-set-context@v3
        with:
          resource-group: 'rg-techwave-devops'
          cluster-name: 'aks-techwave'

      - name: Desplegar en Kubernetes
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secrets.yaml
          # Forzamos la actualización de la imagen para que use la nueva de Docker Hub
          kubectl set image deployment/techwave-deployment techwave-app=yassinelberrak/techwave-app:latest
          kubectl apply -f k8s/service.yaml