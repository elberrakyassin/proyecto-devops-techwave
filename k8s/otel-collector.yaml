apiVersion: v1
kind: ConfigMap
metadata:
  # Cambiamos el nombre para forzar a Kubernetes a actualizar el despliegue
  name: otel-collector-conf-v2
  namespace: monitoring
binaryData:
  # Base64 con 'debug' en lugar de 'logging'
  config.yaml: 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: monitoring
spec:
  # Esta sección ahora apuntará al nuevo ConfigMap, lo que cambiará el hash del Pod
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.88.0
        args: ["--config=/etc/otelcol/config.yaml"]
        volumeMounts:
        - name: config-vol
          mountPath: /etc/otelcol/config.yaml
          subPath: config.yaml
        ports:
        - containerPort: 4317
        - containerPort: 4318
        - containerPort: 8889
      volumes:
      - name: config-vol
        configMap:
          # Referencia al nuevo nombre
          name: otel-collector-conf-v2
          items:
            - key: "config.yaml"
              path: "config.yaml"
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: monitoring
spec:
  type: ClusterIP
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
    - name: otlp-http
      port: 4318
    - name: prometheus
      port: 8889