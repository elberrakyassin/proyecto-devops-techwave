apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-conf
  namespace: monitoring
binaryData:
  # Este Base64 incluye: file_format: 1 + receivers + exporters + service
  config.yaml: 
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector:0.90.0
        args: ["--config=/etc/otelcol/config.yaml"]
        volumeMounts:
        - name: config-vol
          mountPath: /etc/otelcol/config.yaml
          subPath: config.yaml
        ports:
        - containerPort: 4317
        - containerPort: 4318
        - containerPort: 8889
      volumes:
      - name: config-vol
        configMap:
          name: otel-collector-conf
          items:
            - key: "config.yaml"
              path: "config.yaml"